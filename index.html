<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Comic Sans MS', sans-serif; background: transparent; margin: 0; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        #admin-panel { background: #eee; padding: 10px; border-radius: 10px; margin-bottom: 10px; display: none; gap: 5px; font-size: 12px; }
        .game-card { background: white; border-radius: 25px; padding: 20px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; border: 4px solid #FFD700; }
        #word-img { width: 120px; height: 120px; object-fit: contain; margin-bottom: 15px; }
        .slots { display: flex; gap: 8px; justify-content: center; margin: 20px 0; min-height: 60px; }
        .slot { width: 50px; height: 60px; border: 3px dashed #ddd; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; text-transform: uppercase; }
        .pool { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }
        .letter { width: 45px; height: 55px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; color: white; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .vowel { background: #FF4B4B; box-shadow: 0 4px #CC0000; }
        .consonant { background: #4B79FF; box-shadow: 0 4px #0033CC; }
        .letter:active { transform: translateY(4px); box-shadow: none; }
        .hint-anim { animation: pulse 0.6s 3; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); border: 2px solid gold; } 100% { transform: scale(1); } }
        button.admin-btn { position: absolute; top: 0; right: 0; opacity: 0.3; font-size: 10px; }
        .success-msg { color: #28a745; font-weight: bold; display: none; margin-top: 10px; font-size: 20px; }
    </style>
</head>
<body>

    <button class="admin-btn" onclick="toggleAdmin()">⚙️</button>
    
    <div id="admin-panel">
        <input type="text" id="new-word" placeholder="Word (e.g. DOG)">
        <input type="text" id="new-img" placeholder="Image URL">
        <button onclick="updateGame()">Apply</button>
    </div>

    <div class="game-card">
        <img id="word-img" src="https://cdn-icons-png.flaticon.com/512/616/616408.png" alt="word">
        <div class="slots" id="slots-container"></div>
        <div class="pool" id="pool-container"></div>
        <div id="success" class="success-msg">Well done! 🎉</div>
        <button onclick="showHint()" style="margin-top:15px; border:none; background:#FFD700; border-radius:15px; padding:5px 15px; cursor:pointer;">Hint 💡</button>
    </div>

<script>
    let currentWord = "CAT";
    let step = 0;
    const vowels = "AEIOUY";

    function toggleAdmin() {
        const panel = document.getElementById('admin-panel');
        panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
    }

    function updateGame() {
        const w = document.getElementById('new-word').value.toUpperCase();
        const img = document.getElementById('new-img').value;
        if(w) currentWord = w;
        if(img) document.getElementById('word-img').src = img;
        resetGame();
        toggleAdmin();
    }

    function speak(text, rate = 0.8) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US';
        msg.rate = rate;
        window.speechSynthesis.speak(msg);
    }

    function resetGame() {
        step = 0;
        document.getElementById('success').style.display = 'none';
        const slots = document.getElementById('slots-container');
        const pool = document.getElementById('pool-container');
        slots.innerHTML = '';
        pool.innerHTML = '';

        currentWord.split('').forEach(() => {
            const s = document.createElement('div');
            s.className = 'slot';
            slots.appendChild(s);
        });

        const shuffled = currentWord.split('').sort(() => Math.random() - 0.5);
        shuffled.forEach(char => {
            const l = document.createElement('div');
            const isVowel = vowels.includes(char);
            l.className = `letter ${isVowel ? 'vowel' : 'consonant'}`;
            l.innerText = char;
            l.onclick = () => {
                speak(char);
                if(char === currentWord[step]) {
                    document.getElementsByClassName('slot')[step].innerText = char;
                    document.getElementsByClassName('slot')[step].style.borderColor = isVowel ? '#FF4B4B' : '#4B79FF';
                    l.style.visibility = 'hidden';
                    step++;
                    if(step === currentWord.length) {
                        document.getElementById('success').style.display = 'block';
                        speak(currentWord, 0.6);
                    }
                }
            };
            pool.appendChild(l);
        });
    }

    function showHint() {
        const nextChar = currentWord[step];
        const items = document.querySelectorAll('.letter');
        for (let item of items) {
            if (item.innerText === nextChar && item.style.visibility !== 'hidden') {
                item.classList.add('hint-anim');
                setTimeout(() => item.classList.remove('hint-anim'), 2000);
                break;
            }
        }
    }

    resetGame();
</script>
</body>
</html>
