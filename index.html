<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --vowel: #FF4B4B; --cons: #4B79FF; --gold: #FFD700; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fdfdfd; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        
        /* Панель настроек */
        #setup-panel { background: #333; color: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; width: 90%; max-width: 500px; display: block; }
        #setup-panel input { width: 80%; padding: 8px; border-radius: 5px; border: none; margin: 5px 0; }
        .btn { cursor: pointer; border: none; border-radius: 8px; padding: 8px 15px; font-weight: bold; transition: 0.2s; }
        .btn-main { background: var(--gold); color: #333; }
        
        /* Игровая зона */
        #game-zone { display: none; width: 100%; max-width: 450px; text-align: center; background: white; border: 5px solid var(--gold); border-radius: 30px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .word-img { width: 150px; height: 150px; object-fit: contain; margin: 10px; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1)); }
        
        .slots { display: flex; gap: 8px; justify-content: center; margin: 20px 0; }
        .slot { width: 45px; height: 55px; border: 2px solid #ddd; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; text-transform: uppercase; background: #fafafa; }
        
        .pool { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; min-height: 60px; }
        .letter { width: 45px; height: 55px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: bold; color: white; cursor: pointer; text-transform: uppercase; transition: 0.2s; user-select: none; }
        .vowel { background: var(--vowel); box-shadow: 0 4px #b33333; }
        .consonant { background: var(--cons); box-shadow: 0 4px #3355b3; }
        .letter:active { transform: translateY(4px); box-shadow: none; }
        
        .nav-btns { display: flex; justify-content: space-between; margin-top: 20px; width: 100%; }
        .hint-btn { background: #eee; font-size: 14px; }
        .success { color: #28a745; font-size: 24px; font-weight: bold; margin: 10px; min-height: 30px; }
    </style>
</head>
<body>

    <div id="setup-panel">
        <strong>⚙️ Настройка слов</strong><br>
        <small>Введи слова через запятую:</small><br>
        <input type="text" id="words-input" value="CAT, DOG, FROG, SUN, MILK">
        <button class="btn btn-main" onclick="startLearning()">Запустить обучение</button>
        <button class="btn" style="background: #666; color: white;" onclick="toggleEditor()">Скрыть</button>
    </div>

    <button id="show-editor" style="display:none; position: fixed; top: 0; right: 0; opacity: 0.5;" onclick="toggleEditor()">⚙️</button>

    <div id="game-zone">
        <div id="counter" style="font-size: 12px; color: #999;">1 / 5</div>
        <img id="word-img" class="word-img" src="" alt="">
        <div id="success-msg" class="success"></div>
        <div class="slots" id="slots-container"></div>
        <div class="pool" id="pool-container"></div>
        
        <div class="nav-btns">
            <button class="btn" onclick="prevWord()">⬅️</button>
            <button class="btn hint-btn" onclick="showHint()">Hint 💡</button>
            <button class="btn" onclick="nextWord()">➡️</button>
        </div>
    </div>

<script>
    let words = [];
    let currentIndex = 0;
    let step = 0;
    const vowels = "AEIOUY";

    function toggleEditor() {
        const panel = document.getElementById('setup-panel');
        const showBtn = document.getElementById('show-editor');
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        showBtn.style.display = panel.style.display === 'none' ? 'block' : 'none';
    }

    function startLearning() {
        const input = document.getElementById('words-input').value;
        words = input.split(',').map(s => s.trim().toUpperCase()).filter(s => s.length > 0);
        if (words.length > 0) {
            currentIndex = 0;
            document.getElementById('game-zone').style.display = 'block';
            loadWord();
            toggleEditor();
        }
    }

    function loadWord() {
        const word = words[currentIndex];
        step = 0;
        document.getElementById('success-msg').innerText = '';
        document.getElementById('counter').innerText = `${currentIndex + 1} / ${words.length}`;
        
        // Авто-картинка (используем сервис прозрачных иконок)
        document.getElementById('word-img').src = `https://api.dicebear.com/7.x/identicon/svg?seed=${word}`; // Заглушка
        // Попытка взять реальную иконку
        document.getElementById('word-img').src = `https://img.icons8.com/color/200/${word.toLowerCase()}.png`;

        const slots = document.getElementById('slots-container');
        const pool = document.getElementById('pool-container');
        slots.innerHTML = '';
        pool.innerHTML = '';

        word.split('').forEach(() => {
            const s = document.createElement('div');
            s.className = 'slot';
            slots.appendChild(s);
        });

        const shuffled = word.split('').sort(() => Math.random() - 0.5);
        shuffled.forEach(char => {
            const l = document.createElement('div');
            const isVowel = vowels.includes(char);
            l.className = `letter ${isVowel ? 'vowel' : 'consonant'}`;
            l.innerText = char;
            l.onclick = () => handleLetterClick(char, l);
            pool.appendChild(l);
        });
    }

    function handleLetterClick(char, element) {
        const word = words[currentIndex];
        speak(char, 0.8);

        if (char === word[step]) {
            const slots = document.getElementsByClassName('slot');
            slots[step].innerText = char;
            slots[step].style.borderColor = vowels.includes(char) ? 'var(--vowel)' : 'var(--cons)';
            element.style.visibility = 'hidden';
            step++;

            if (step === word.length) {
                document.getElementById('success-msg').innerText = 'EXCELLENT! 🎉';
                speak(word, 0.6);
            }
        }
    }

    function speak(text, rate) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US';
        msg.rate = rate;
        window.speechSynthesis.speak(msg);
    }

    function showHint() {
        const target = words[currentIndex][step];
        const letters = document.querySelectorAll('.letter');
        for (let l of letters) {
            if (l.innerText === target && l.style.visibility !== 'hidden') {
                l.style.transform = "scale(1.2)";
                setTimeout(() => l.style.transform = "scale(1)", 500);
                break;
            }
        }
    }

    function nextWord() {
        if (currentIndex < words.length - 1) {
            currentIndex++;
            loadWord();
        }
    }

    function prevWord() {
        if (currentIndex > 0) {
            currentIndex--;
            loadWord();
        }
    }
</script>
</body>
</html>
